<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medic8d Notes</title>
    <style>
        body {
            background-color: #000000; /* Pure black background */
            color: white;
        }
        .note {
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            transition: box-shadow 0.3s;
        }
        .note:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 1); /* strengthened glow styling */
        }
        /* Additional styles for note shapes */
        .rect {
            width: 100px;
            height: 50px;
            background-color: rgba(255, 0, 255, 0.5);
        }
        .circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: rgba(0, 255, 255, 0.5);
        }
        .pill {
            width: 100px;
            height: 50px;
            border-radius: 25px;
            background-color: rgba(0, 255, 0, 0.5);
        }
        .hex {
            width: 100px;
            height: 100px;
            background-color: rgba(255, 255, 0, 0.5);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .fold {
            width: 50px;
            height: 50px;
            background-color: rgba(255, 128, 0, 0.5);
            /* Fold shape styling */
        }
    </style>
</head>

    </ul>
</body>
</html>
